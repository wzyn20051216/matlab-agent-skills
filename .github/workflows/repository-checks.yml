name: Repository Checks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  powershell-and-docs:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors) {
              $failed = $true
              Write-Error "PowerShell parse errors in $($_.FullName): $($errors | Out-String)"
            }
          }
          if ($failed) { exit 1 }

      - name: Check for machine-specific paths in public docs
        shell: pwsh
        run: |
          $files = @("README.md")
          $files += Get-ChildItem docs, scripts, .github -Recurse -File |
            Where-Object { $_.Name -ne "repository-checks.yml" } |
            Select-Object -ExpandProperty FullName

          $matches = Select-String -Path $files -Pattern 'C:\\Users\\[^<]|[ED]:\\' -AllMatches
          if ($matches) {
            $matches | ForEach-Object {
              "{0}:{1}:{2}" -f $_.Path, $_.LineNumber, $_.Line.Trim()
            }
            exit 1
          }
